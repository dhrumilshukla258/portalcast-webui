<svg width="100%" height="100%" viewBox="0 0 420 90" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="pcGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00C6FF;" />
            <stop offset="100%" style="stop-color:#0072FF;" />
        </linearGradient>
        <radialGradient id="pcGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" style="stop-color:#00C6FF;stop-opacity:0.55;" />
            <stop offset="100%" style="stop-color:#00C6FF;stop-opacity:0;" />
        </radialGradient>
    </defs>

    <!-- Ambient glow behind the icon, so it reads as part of the glass surface it sits on rather than a flat cutout -->
    <circle cx="42" cy="42" r="42" fill="url(#pcGlow)" />

    <!-- Icon: portal ring + play mark + broadcast arcs -->
    <g transform="translate(0, -3)">
        <circle cx="42" cy="45" r="30" fill="none" stroke="url(#pcGradient)" stroke-width="6" stroke-linecap="round" stroke-dasharray="162 12" />
        <path d="M34 33 L60 45 L34 58 Z" fill="url(#pcGradient)" />
        <path d="M67 21 A 19 19 0 0 1 76 33" fill="none" stroke="url(#pcGradient)" stroke-width="5" stroke-linecap="round" opacity="0.85" />
        <path d="M73 12 A 31 31 0 0 1 85 30" fill="none" stroke="url(#pcGradient)" stroke-width="5" stroke-linecap="round" opacity="0.55" />
    </g>

    <!-- Wordmark -->
    <g id="text-group" transform="translate(105, 0)">
        <text
            x="0"
            y="46"
            fill="url(#pcGradient)"
            style="font-family: 'Montserrat', sans-serif; font-size: 36px; font-weight: 800; letter-spacing: 1px; dominant-baseline: middle;">
            Portalcast
        </text>
        <text
            x="2"
            y="70"
            fill="url(#pcGradient)"
            style="font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 3px; dominant-baseline: middle; opacity: 0.8;">
            Stream · Watch · Cast
        </text>
    </g>
</svg>
