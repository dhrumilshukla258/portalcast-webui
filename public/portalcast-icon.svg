<svg width="500" height="500" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="pcGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#7C3AED;" />
            <stop offset="100%" style="stop-color:#06B6D4;" />
        </linearGradient>
    </defs>

    <!-- Portal ring (gateway) -->
    <circle cx="55" cy="60" r="38" fill="none" stroke="url(#pcGradient)" stroke-width="7" stroke-linecap="round" stroke-dasharray="205 15" />

    <!-- Play mark, centered in the portal -->
    <path d="M45 44 L79 60 L45 76 Z" fill="url(#pcGradient)" />

    <!-- Broadcast arcs, cast signal emanating up-right -->
    <path d="M88 30 A 24 24 0 0 1 100 45" fill="none" stroke="url(#pcGradient)" stroke-width="6" stroke-linecap="round" opacity="0.85" />
    <path d="M96 18 A 40 40 0 0 1 112 42" fill="none" stroke="url(#pcGradient)" stroke-width="6" stroke-linecap="round" opacity="0.55" />
</svg>
